<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multimedia Dictionary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 24px;
      margin-bottom: 6px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select, textarea {
      flex: 1;
      font-size: 1rem;
      padding: 8px;
    }

    textarea {
      resize: none;
      height: 60px;
    }

    button {
      padding: 8px 14px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Multimedia Dictionary</h1>

  <!-- WORD SECTION -->
  <label>Word:</label>
  <div class="row">
    <select id="wordSelect" onchange="syncWord()">
      <option value="">-- Select a Word --</option>
      <option value="Pixel"  data-sentence="A pixel is the smallest unit of a digital image displayed on a screen.">Pixel</option>
      <option value="Resolution" data-sentence="The resolution of an image refers to the number of pixels it contains per inch.">Resolution</option>
      <option value="Codec"     data-sentence="A codec is software used to compress and decompress digital video or audio files.
">Codec</option>
      <option value="Bandwidth"   data-sentence="Bandwidth is the amount of data that can be transmitted over a network in a given time.
">Bandwidth</option>
      <option value="Vector"   data-sentence="A vector graphic uses mathematical equations instead of pixels to create images that scale without losing quality.

">Vector</option>
    </select>
    <button onclick="speakWord()">Speak Word</button>
  </div>

  <!-- SENTENCE SECTION -->
  <label>Sentence:</label>
  <div class="row">
    <textarea id="sentenceDisplay" readonly placeholder="Select a word above..."></textarea>
    <button onclick="speakSentence()">Speak Sentence</button>
  </div>

  <script src="dictionary.js"></script>
</body>
</html>
