<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multimedia Dictionary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 24px;
      margin-bottom: 6px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select, textarea {
      flex: 1;
      font-size: 1rem;
      padding: 8px;
    }

    textarea {
      resize: none;
      height: 60px;
    }

    button {
      padding: 8px 14px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Multimedia Dictionary</h1>

  <!-- WORD SECTION -->
  <label>Word:</label>
  <div class="row">
    <select id="wordSelect" onchange="syncWord()">
      <option value="">-- Select a Word --</option>
      <option value="Ambiguous"  data-sentence="The instructions were so ambiguous that no one knew what to do.">Ambiguous</option>
      <option value="Benevolent" data-sentence="The benevolent teacher stayed after class to help every struggling student.">Benevolent</option>
      <option value="Candid"     data-sentence="She gave a candid answer instead of saying what people wanted to hear.">Candid</option>
      <option value="Diligent"   data-sentence="The diligent student reviewed his notes every night before bed.">Diligent</option>
      <option value="Eloquent"   data-sentence="Her eloquent speech moved the entire audience to tears.">Eloquent</option>
    </select>
    <button onclick="speakWord()">Speak Word</button>
  </div>

  <!-- SENTENCE SECTION -->
  <label>Sentence:</label>
  <div class="row">
    <textarea id="sentenceDisplay" readonly placeholder="Select a word above..."></textarea>
    <button onclick="speakSentence()">Speak Sentence</button>
  </div>

  <script src="dictionary.js"></script>
</body>
</html>
